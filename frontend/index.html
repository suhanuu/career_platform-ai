<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职引未来 - AI职业规划平台</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <!-- ========== 背景装饰 ========== -->
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
    </div>

    <!-- ========== 主容器 ========== -->
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="12" fill="url(#logo-grad)"/>
                        <path d="M12 28L20 12L28 28H12Z" fill="white" opacity="0.9"/>
                        <circle cx="20" cy="24" r="3" fill="white"/>
                        <defs>
                            <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#4F6EF7"/>
                                <stop offset="100%" stop-color="#7C5CFC"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="app-title">职引未来</h1>
            </div>
            <nav class="header-nav">
                <button class="nav-btn active" data-tab="chat">
                    <span class="nav-icon">💬</span>
                    AI职业对话
                </button>
                <button class="nav-btn" data-tab="match">
                    <span class="nav-icon">🎯</span>
                    技能匹配
                </button>
            </nav>
            <div class="header-right">
                <div id="user-info" class="user-info" style="display:none;">
                    <span class="user-avatar">👤</span>
                    <span id="user-name" class="user-name"></span>
                    <button id="logout-btn" class="logout-btn">退出</button>
                </div>
                <button id="login-btn" class="login-btn">登录</button>
                <span class="version-tag">v1.0</span>
            </div>
        </header>

        <!-- 主体内容区 -->
        <main class="app-main">
            <!-- ===== AI对话页 ===== -->
            <section id="tab-chat" class="tab-content active">
                <div class="chat-container">
                    <!-- 欢迎界面 -->
                    <div id="chat-welcome" class="chat-welcome">
                        <div class="welcome-icon">
                            <svg viewBox="0 0 80 80" fill="none">
                                <circle cx="40" cy="40" r="38" stroke="#4F6EF7" stroke-width="2" stroke-dasharray="6 4"/>
                                <circle cx="40" cy="40" r="20" fill="#4F6EF7" opacity="0.1"/>
                                <text x="40" y="46" text-anchor="middle" font-size="24">🤖</text>
                            </svg>
                        </div>
                        <h2>你好！我是你的AI职业规划师</h2>
                        <p>告诉我你的专业、年级和兴趣方向，我来帮你规划职业发展路径</p>
                        <div class="welcome-suggestions">
                            <button class="suggestion-chip" data-msg="我是计算机专业大三学生，对人工智能方向感兴趣，帮我规划一下">🎓 计算机专业如何规划AI方向？</button>
                            <button class="suggestion-chip" data-msg="我学的是金融，但是不知道自己适合什么岗位">💰 金融专业有哪些岗位选择？</button>
                            <button class="suggestion-chip" data-msg="我想转行做产品经理，需要具备哪些技能？">📱 转行产品经理需要什么技能？</button>
                            <button class="suggestion-chip" data-msg="快毕业了很迷茫，不知道该考研还是工作">🤔 考研还是工作？</button>
                        </div>
                    </div>
                    <!-- 消息列表 -->
                    <div id="chat-messages" class="chat-messages" style="display:none;"></div>
                    <!-- 输入区 -->
                    <div class="chat-input-area">
                        <div class="chat-input-wrapper">
                            <textarea id="chat-input" class="chat-input" placeholder="输入你的问题..." rows="1" maxlength="2000"></textarea>
                            <button id="chat-send-btn" class="chat-send-btn" title="发送">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"/>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                                </svg>
                            </button>
                        </div>
                        <button id="chat-clear-btn" class="chat-clear-btn">清空对话</button>
                    </div>
                </div>
            </section>

            <!-- ===== 技能匹配页 ===== -->
            <section id="tab-match" class="tab-content">
                <div class="match-container">
                    <!-- 左侧：技能选择 -->
                    <div class="match-left">
                        <div class="match-panel">
                            <h3 class="panel-title">
                                <span class="panel-icon">🏷️</span> 选择你的技能
                            </h3>
                            <p class="panel-desc">点击标签选中你已掌握的技能（至少选3个）</p>
                            <div class="skill-section">
                                <h4 class="skill-category-label">🔧 硬技能</h4>
                                <div id="hard-skills-cloud" class="skill-cloud"></div>
                            </div>
                            <div class="skill-section">
                                <h4 class="skill-category-label">💡 软技能</h4>
                                <div id="soft-skills-cloud" class="skill-cloud"></div>
                            </div>
                            <div class="selected-info">
                                已选择：<span id="selected-count">0</span> 个技能
                            </div>
                            <button id="match-btn" class="match-btn" disabled>
                                <span class="btn-icon">🔍</span> 开始匹配
                            </button>
                        </div>
                    </div>
                    <!-- 右侧：匹配结果 -->
                    <div class="match-right">
                        <div id="match-placeholder" class="match-placeholder">
                            <div class="placeholder-icon">📊</div>
                            <h3>选择技能后点击匹配</h3>
                            <p>系统会分析你的技能与岗位的匹配度<br>并用雷达图展示技能差距</p>
                        </div>
                        <div id="match-results" class="match-results" style="display:none;"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ========== 登录/注册弹窗 ========== -->
    <div id="auth-modal" class="auth-modal-overlay" style="display:none;">
        <div class="auth-modal">
            <button class="auth-modal-close">&times;</button>
            <div class="auth-tabs">
                <button class="auth-tab active" data-auth-tab="login">登录</button>
                <button class="auth-tab" data-auth-tab="register">注册</button>
            </div>
            <!-- 登录表单 -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required>
                </div>
                <p id="login-error" class="form-error" style="display:none;"></p>
                <button type="submit" class="auth-submit-btn">登 录</button>
            </form>
            <!-- 注册表单 -->
            <form id="register-form" class="auth-form" style="display:none;">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="reg-username" placeholder="2-50个字符" minlength="2" maxlength="50" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" placeholder="至少6位密码" minlength="6" required>
                </div>
                <div class="form-group">
                    <label>邮箱 <span class="optional-tag">选填</span></label>
                    <input type="email" id="reg-email" placeholder="example@qq.com">
                </div>
                <p id="register-error" class="form-error" style="display:none;"></p>
                <button type="submit" class="auth-submit-btn">注 册</button>
            </form>
        </div>
    </div>

    <!-- ========== Toast 提示 ========== -->
    <div id="toast" class="toast"></div>

    <!-- ========== 加载遮罩 ========== -->
    <div id="loading-overlay" class="loading-overlay" style="display:none;">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>AI思考中...</p>
        </div>
    </div>

    <!-- JavaScript 模块 -->
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/match.js"></script>
</body>
</html>
